<style>
:root{
  --bg:#0a0f1a; --card:#141c2b; --card2:#1b2536; --border:#26324a;
  --cyan:#06b6d4; --cyan-d:#0891b2; --text:#e5edf5; --muted:#94a3b8; --muted2:#64748b;
  --green:#10b981; --orange:#f59e0b; --red:#ef4444; --pink:#f472b6;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;}
html,body{background:var(--bg);color:var(--text);-webkit-text-size-adjust:100%;}
body{overscroll-behavior:none;}
button{cursor:pointer;border:none;background:none;color:inherit;font-size:inherit;}
input,select,textarea{font-size:16px;font-family:inherit;}
::-webkit-scrollbar{display:none;}
#app{max-width:460px;margin:0 auto;min-height:100vh;padding-top:env(safe-area-inset-top);padding-bottom:92px;}
main{padding:14px 16px 16px;}
h1{font-size:19px;font-weight:700;}
.muted{color:var(--muted);} .muted2{color:var(--muted2);}
.row{display:flex;gap:12px;} .between{display:flex;align-items:center;justify-content:space-between;}
.mb1{margin-bottom:4px;}.mb2{margin-bottom:12px;}.mb3{margin-bottom:16px;}.mb4{margin-bottom:20px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:18px;}
.pad{padding:16px;}
.pop{animation:pop .18s ease-out;} @keyframes pop{from{transform:scale(.97);opacity:.3}to{transform:scale(1);opacity:1}}
.icobox{border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.label{font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);margin-bottom:6px;display:block;}
.field{margin-bottom:12px;}
.input{width:100%;min-width:0;background:#0c1320;border:1px solid var(--border);border-radius:12px;padding:12px 14px;color:var(--text);outline:none;box-sizing:border-box;}
.input:focus{border-color:var(--cyan);}

input[type="date"].input{
  -webkit-appearance:none;
  appearance:none;
  display:block;
  width:100%;
  min-width:0;
  box-sizing:border-box;
  height:46px;
  padding:12px 14px;
  line-height:22px;
}
input[type="date"]::-webkit-date-and-time-value{text-align:left;}
.input,input[type="date"],input[type="number"],input[type="text"],select{box-sizing:border-box;}

select.input{appearance:none;-webkit-appearance:none;padding-right:38px;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%2394a3b8' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'/></svg>");background-repeat:no-repeat;background-position:right 12px center;}
.btn{border-radius:12px;padding:13px;font-weight:700;text-align:center;display:flex;align-items:center;justify-content:center;gap:8px;transition:.1s;}
.btn:active{transform:scale(.98);}
.btn-primary{background:var(--cyan);color:#06222b;}
.btn-ghost{background:var(--card2);border:1px solid var(--border);color:var(--text);font-weight:600;}
.chip{font-size:10px;padding:3px 9px;border-radius:999px;font-weight:600;}
.seg{display:flex;gap:8px;} .seg button{flex:1;border-radius:10px;padding:9px 4px;font-size:13px;font-weight:600;background:#0c1320;color:var(--muted);border:1px solid transparent;}
.seg button.active{background:var(--card2);color:#fff;}
.selbtn{border:1px solid var(--border);border-radius:12px;padding:11px 8px;display:flex;align-items:center;justify-content:center;gap:6px;font-size:13px;font-weight:600;color:var(--muted);min-width:0;overflow:hidden;}
.selbtn.active{border-color:var(--cyan);background:rgba(6,182,212,.12);color:#67e8f9;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.stat{flex:1;min-width:0;}
.stat .v{font-size:20px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bar{height:8px;border-radius:999px;background:#22304a;overflow:hidden;}
.bar>span{display:block;height:100%;border-radius:999px;transition:width .6s;}
.listitem{padding:14px;} .trunc{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
input[type=range]{-webkit-appearance:none;height:6px;border-radius:999px;background:#22304a;outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:var(--cyan);border:3px solid #06222b;}
nav{position:fixed;bottom:0;left:0;right:0;background:rgba(10,15,26,.96);backdrop-filter:blur(12px);border-top:1px solid var(--border);padding-bottom:env(safe-area-inset-bottom);z-index:30;}
nav .inner{max-width:460px;margin:0 auto;display:flex;}
nav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 0 8px;color:var(--muted2);}
nav button.active{color:var(--cyan);}
nav .lbl{font-size:10px;font-weight:600;}
.overlay{position:fixed;inset:0;background:rgba(4,8,15,.72);z-index:40;display:flex;align-items:flex-end;}
.sheet{background:var(--card);border-top-left-radius:22px;border-top-right-radius:22px;border:1px solid var(--border);width:100%;max-width:460px;margin:0 auto;padding:20px 16px calc(24px + env(safe-area-inset-bottom));animation:up .22s ease-out;}
@keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
svg{display:block;}
.thumb{border:1px solid var(--border);border-radius:12px;overflow:hidden;position:relative;display:inline-block;}
.thumb img{display:block;width:88px;height:88px;object-fit:cover;}
.thumb .del{position:absolute;top:4px;right:4px;width:24px;height:24px;border-radius:50%;background:rgba(4,8,15,.8);color:#fff;display:flex;align-items:center;justify-content:center;}
.suggestbox{position:absolute;left:0;right:0;top:100%;margin-top:4px;background:var(--card2);border:1px solid var(--border);border-radius:12px;overflow:hidden;z-index:20;box-shadow:0 8px 24px rgba(0,0,0,.35);}
.suggestrow{padding:11px 14px;font-size:14px;cursor:pointer;border-bottom:1px solid var(--border);}
.suggestrow:last-child{border-bottom:none;}
.suggestrow:active{background:var(--bg);}
.modal{position:fixed;inset:0;background:rgba(4,8,15,.92);z-index:60;display:flex;flex-direction:column;padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);}
.modal .imgwrap{flex:1;min-height:0;display:flex;align-items:center;justify-content:center;padding:16px;overflow:auto;}
.modal img{max-width:100%;max-height:100%;border-radius:12px;}
.modal .bar{display:flex;gap:10px;padding:12px 16px;}
#toast{position:fixed;left:0;right:0;bottom:104px;display:flex;justify-content:center;z-index:70;pointer-events:none;}
#toast .t{background:var(--card2);border:1px solid var(--border);color:var(--text);padding:10px 16px;border-radius:12px;font-size:13px;box-shadow:0 8px 24px rgba(0,0,0,.45);opacity:0;transform:translateY(8px);transition:.25s;max-width:88%;text-align:center;}
#toast .t.show{opacity:1;transform:none;}

/* ============ Constants & seed ============ */
var TVA_LIMIT=25000;
var DRIVE_CLIENT_ID='376867033640-00ni2l2s06kgol1hjrfs75s5fjert4v5.apps.googleusercontent.com'; // ID client OAuth (public, restreint à l'origine autorisée)
var CATEGORIES=[
 {key:'Matériel revendu',icon:'box',color:'#22d3ee',deduc:100},
 {key:'Outillage & Équipement',icon:'wrench',color:'#a78bfa',deduc:100},
 {key:'Déplacements',icon:'truck',color:'#f59e0b',deduc:100},
 {key:'Fonctionnement',icon:'gear',color:'#f472b6',deduc:100},
 {key:'Formations & Logiciels',icon:'book',color:'#38bdf8',deduc:100},
 {key:'Logement / Hôtel',icon:'bed',color:'#2dd4bf',deduc:100},
 {key:'Vêtements & EPI',icon:'shirt',color:'#a3e635',deduc:100},
 {key:'Restaurant',icon:'utensils',color:'#fb7185',deduc:69},
 {key:'Cadeaux clients',icon:'gift',color:'#e879f9',deduc:50}
];
var catMeta=function(k){for(var i=0;i<CATEGORIES.length;i++)if(CATEGORIES[i].key===k)return CATEGORIES[i];return CATEGORIES[0];};

var SEED={
 chantiers:[
  {id:uid(),client:'Janssens',description:'Installation mono-split 3,5 kW salon',montant:1850,statut:'paye',date:'2026-05-14'},
  {id:uid(),client:'Boulangerie Dupuis',description:'Entretien chambre froide + gaz',montant:640,statut:'paye',date:'2026-06-02'},
  {id:uid(),client:'Villa Lecomte',description:'Multi-split 3 unités (devis accepté)',montant:5400,statut:'en_cours',date:'2026-06-28'},
  {id:uid(),client:'Café Le Central',description:'Dépannage clim gainable',montant:320,statut:'paye',date:'2026-06-20'}
 ],
 frais:[
  {id:uid(),libelle:'Station de récupération fluide (grossiste)',montant:780,date:'2026-04-10',categorie:'Outillage & Équipement'},
  {id:uid(),libelle:'Groupe mono-split Janssens (revendu)',montant:640,date:'2026-05-10',categorie:'Matériel revendu'},
  {id:uid(),libelle:'Plein carburant camionnette',montant:95,date:'2026-06-01',categorie:'Déplacements'},
  {id:uid(),libelle:'Assurance RC pro (trimestre)',montant:120,date:'2026-06-15',categorie:'Fonctionnement'},
  {id:uid(),libelle:'Détecteur de fuite électronique',montant:210,date:'2026-06-22',categorie:'Outillage & Équipement'}
 ],
 devis:{materiel:[],coeff:1.25,heures:'',tarif:60,deplacement:40},
 settings:{tauxProvision:55}
};

/* ============ State ============ */
var KEY='boreas_state_v2';
var state=(function(){
 try{var s=JSON.parse(localStorage.getItem(KEY));if(s&&s.chantiers)return s;}catch(e){}
 // migration depuis l'ancienne version si présente
 try{
  var oc=JSON.parse(localStorage.getItem('boreas_chantiers'));
  var of=JSON.parse(localStorage.getItem('boreas_frais'));
  if(oc||of)return{chantiers:oc||SEED.chantiers,frais:of||SEED.frais,devis:SEED.devis,settings:SEED.settings};
 }catch(e){}
 return JSON.parse(JSON.stringify(SEED));
})();
if(!state.settings)state.settings={tauxProvision:55};
if(!state.devis)state.devis=SEED.devis;
/* Migration : l'ancien champ unique "prixAchat" devient une liste de matériel détaillée.
   Fonction réutilisable (appelée au démarrage ET après un import de sauvegarde,
   pour ne pas perdre les données d'un fichier exporté avant cette évolution). */
function migrateDevis(d){
 if(!d)d={materiel:[],coeff:1.25,heures:'',tarif:60,deplacement:40};
 if(!d.materiel){
  var legacyPrix=Number(d.prixAchat)||0;
  d.materiel=legacyPrix?[{id:uid(),libelle:'Matériel',prix:legacyPrix}]:[];
  delete d.prixAchat;
 }
 return d;
}
var neededMigration=!state.devis.materiel;
state.devis=migrateDevis(state.devis);
if(neededMigration)persist(true);
if(!state.settings.deduc)state.settings.deduc={};
CATEGORIES.forEach(function(c){ if(state.settings.deduc[c.key]==null) state.settings.deduc[c.key]=c.deduc; });
function deducOf(k){ var v=(state.settings.deduc||{})[k]; if(v==null)v=catMeta(k).deduc; v=Number(v); if(isNaN(v))v=100; return Math.max(0,Math.min(100,v)); }
function persist(keepTs){ if(!keepTs){ state.updatedAt=Date.now(); scheduleAutoSync(); } try{localStorage.setItem(KEY,JSON.stringify(state));}catch(e){} }

/* ============ Clients ============ */
if(!state.clients)state.clients=[];
function normName(s){ return String(s||'').trim().toLowerCase().replace(/\s+/g,' '); }
function findClientByName(name){ var n=normName(name); if(!n)return null; var f=state.clients.filter(function(c){return normName(c.nom)===n;}); return f[0]||null; }
function findOrCreateClient(name){
 name=String(name||'').trim(); if(!name)return null;
 var existing=findClientByName(name); if(existing)return existing;
 var c={id:uid(),nom:name,telephone:'',email:'',adresse:'',notes:'',createdAt:Date.now()};
 state.clients.push(c); return c;
}
/* Rattache automatiquement les chantiers déjà existants (créés avant cette fonctionnalité)
   à une fiche client, sur base du nom, pour que l'onglet Clients reflète tout l'historique. */
function migrateClientLinks(){
 var changed=false;
 state.chantiers.forEach(function(c){
  if(!c.clientId&&c.client){ var cl=findOrCreateClient(c.client); if(cl){c.clientId=cl.id; changed=true;} }
 });
 return changed;
}
if(migrateClientLinks())persist(true);
function clientStats(id){
 var list=state.chantiers.filter(function(c){return c.clientId===id;});
 var total=list.reduce(function(s,c){return s+(Number(c.montant)||0);},0);
 var sorted=list.slice().sort(function(a,b){return(b.date||'').localeCompare(a.date||'');});
 return{count:list.length,total:total,last:sorted[0]||null};
}
if(!state.updatedAt){ state.updatedAt=Date.now(); persist(true); }
function effectiveClientId(){ return (state.settings.driveClientId||'').trim() || DRIVE_CLIENT_ID; }

/* Demande au navigateur de ne pas effacer les données sous pression de stockage
   (Safari/Chrome peuvent sinon vider localStorage/IndexedDB d'un site peu visité) */
try{
 if(navigator.storage&&navigator.storage.persist){
  navigator.storage.persisted().then(function(already){
   if(!already)navigator.storage.persist();
  });
 }
}catch(e){}

/* ============ Justificatifs : IndexedDB ============ */
var DB=null, DBERR=false;
function idbOpen(cb){
 if(DB)return cb(DB); if(DBERR||!window.indexedDB)return cb(null);
 try{
  var r=indexedDB.open('boreas_db',2);
  r.onupgradeneeded=function(e){var db=e.target.result; if(!db.objectStoreNames.contains('receipts'))db.createObjectStore('receipts',{keyPath:'id'}); if(!db.objectStoreNames.contains('cphotos'))db.createObjectStore('cphotos',{keyPath:'id'});};
  r.onsuccess=function(e){DB=e.target.result;cb(DB);};
  r.onerror=function(){DBERR=true;cb(null);};
 }catch(e){DBERR=true;cb(null);}
}
function idbPut(rec,cb){idbOpen(function(db){if(!db)return cb&&cb(false);try{var t=db.transaction('receipts','readwrite');t.objectStore('receipts').put(rec);t.oncomplete=function(){cb&&cb(true);};t.onerror=function(){cb&&cb(false);};}catch(e){cb&&cb(false);}});}
function idbGet(id,cb){idbOpen(function(db){if(!db)return cb(null);try{var r=db.transaction('receipts').objectStore('receipts').get(id);r.onsuccess=function(){cb(r.result||null);};r.onerror=function(){cb(null);};}catch(e){cb(null);}});}
function idbDel(id,cb){idbOpen(function(db){if(!db)return cb&&cb(false);try{var t=db.transaction('receipts','readwrite');t.objectStore('receipts').delete(id);t.oncomplete=function(){cb&&cb(true);};t.onerror=function(){cb&&cb(false);};}catch(e){cb&&cb(false);}});}
function idbKeys(cb){idbOpen(function(db){if(!db)return cb([]);try{var r=db.transaction('receipts').objectStore('receipts').getAllKeys();r.onsuccess=function(){cb(r.result||[]);};r.onerror=function(){cb([]);};}catch(e){cb([]);}});}

function idbGetC(id,cb){idbOpen(function(db){if(!db)return cb(null);try{var r=db.transaction('cphotos').objectStore('cphotos').get(id);r.onsuccess=function(){cb(r.result||null);};r.onerror=function(){cb(null);};}catch(e){cb(null);}});}

/* Compression via canvas (max 1400px, JPEG 0.7) */
function compressImage(file,cb){
 try{
  var img=new Image(), url=URL.createObjectURL(file);
  img.onload=function(){
   var max=1400,w=img.width,h=img.height;
   if(w>h&&w>max){h=Math.round(h*max/w);w=max;} else if(h>=w&&h>max){w=Math.round(w*max/h);h=max;}
   var cv=document.createElement('canvas');cv.width=w;cv.height=h;
   cv.getContext('2d').drawImage(img,0,0,w,h);
   URL.revokeObjectURL(url);
   cv.toBlob(function(b){cb(b);}, 'image/jpeg', 0.7);
  };
  img.onerror=function(){URL.revokeObjectURL(url);cb(null);};
  img.src=url;
 }catch(e){cb(null);}
}

/* ============ Google Drive (surcouche optionnelle, chargée à la demande) ============ */
function loadScript(src,cb){
 if(document.querySelector('script[src="'+src+'"]'))return cb(true);
 var s=document.createElement('script');s.src=src;s.async=true;
 s.onload=function(){cb(true);};s.onerror=function(){cb(false);};
 document.head.appendChild(s);
}
var driveTok=null, driveTokExp=0;
function driveToken(clientId,cb,silent){
 if(driveTok&&Date.now()<driveTokExp-60000)return cb(driveTok);
 loadScript('https://accounts.google.com/gsi/client',function(ok){
  if(!ok||!window.google||!google.accounts||!google.accounts.oauth2)return cb(null,'Librairie Google inaccessible (hors-ligne ?)');
  try{
   var tc=google.accounts.oauth2.initTokenClient({
    client_id:clientId,
    scope:'https://www.googleapis.com/auth/drive.file',
    callback:function(resp){ if(resp&&resp.access_token){ driveTok=resp.access_token; driveTokExp=Date.now()+(Number(resp.expires_in||3600)*1000); cb(driveTok);} else cb(null,(resp&&resp.error)||'Autorisation refusée'); },
    error_callback:function(e){ cb(null,(e&&e.type)||'consentement requis'); }
   });
   tc.requestAccessToken(silent?{prompt:''}:{});
  }catch(e){cb(null,e.message);}
 });
}
function driveUploadBlob(token,blob,name,parentId,cb){
 try{
  var meta={name:name,mimeType:'image/jpeg'}; if(parentId)meta.parents=[parentId];
  var fd=new FormData();
  fd.append('metadata',new Blob([JSON.stringify(meta)],{type:'application/json'}));
  fd.append('file',blob);
  fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,webViewLink',{
   method:'POST',headers:{Authorization:'Bearer '+token},body:fd
  }).then(function(r){return r.json();}).then(function(j){cb(j);}).catch(function(e){cb(null,e.message);});
 }catch(e){cb(null,e.message);}
}
/* Dossier "boreas" dédié (créé par l'app, accessible via scope drive.file) */
function driveEnsureFolder(token,cb){
 var q="name='boreas' and mimeType='application/vnd.google-apps.folder' and trashed=false";
 fetch('https://www.googleapis.com/drive/v3/files?spaces=drive&fields='+encodeURIComponent('files(id)')+'&q='+encodeURIComponent(q),{headers:{Authorization:'Bearer '+token}})
  .then(function(r){return r.json();}).then(function(j){
   if(j&&j.files&&j.files[0])return cb(j.files[0].id);
   fetch('https://www.googleapis.com/drive/v3/files?fields=id',{method:'POST',headers:{Authorization:'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify({name:'boreas',mimeType:'application/vnd.google-apps.folder'})})
    .then(function(r){return r.json();}).then(function(j2){cb(j2&&j2.id);}).catch(function(){cb(null);});
  }).catch(function(){cb(null);});
}

/* Construit la table fraisId -> idDriveDuTicket depuis IndexedDB */
function gatherReceipts(cb){
 idbKeys(function(keys){
  var todo=keys.slice(), map={};
  (function next(){ if(!todo.length)return cb(map); var id=todo.shift(); idbGet(id,function(rec){ if(rec&&rec.drive&&rec.drive.id)map[id]=rec.drive.id; next(); }); })();
 });
}
/* Idem pour les photos de chantiers */
function gatherCPhotos(cb){
 idbKeysC(function(keys){
  var todo=keys.slice(), map={};
  (function next(){ if(!todo.length)return cb(map); var id=todo.shift(); idbGetC(id,function(rec){ if(rec&&rec.drive&&rec.drive.id)map[id]=rec.drive.id; next(); }); })();
 });

/* Télécharge depuis Drive les tickets absents localement (restauration nouvel appareil) */
function driveDownloadFile(token,fileId,cb){
 fetch('https://www.googleapis.com/drive/v3/files/'+fileId+'?alt=media',{headers:{Authorization:'Bearer '+token}})
  .then(function(r){return r.blob();}).then(function(b){cb(b);}).catch(function(){cb(null);});
}
function downloadMissingPhotos(token,map,cb){
 if(!map)return cb(0);
 var ids=Object.keys(map), n=0;
 (function next(){
  if(!ids.length)return cb(n);
  var fid=ids.shift(), drvId=map[fid];
  if(receiptIds[fid]||!drvId)return next();
  driveDownloadFile(token,drvId,function(blob){
   if(!blob)return next();
   idbPut({id:fid,blob:blob,drive:{id:drvId,link:''}},function(ok){ if(ok){receiptIds[fid]=true;receiptDrive[fid]={id:drvId,link:''};n++;} next(); });
  });
 })();
}
/* Idem pour les photos de chantiers manquantes localement */
function downloadMissingCPhotos(token,map,cb){
 if(!map)return cb(0);
 var ids=Object.keys(map), n=0;
 (function next(){
  if(!ids.length)return cb(n);
  var pid=ids.shift(), drvId=map[pid];
  if(cphotoIds[pid]||!drvId)return next();
  driveDownloadFile(token,drvId,function(blob){
   if(!blob)return next();
   idbPutC({id:pid,blob:blob,drive:{id:drvId,link:''}},function(ok){ if(ok){cphotoIds[pid]=true;n++;} next(); });
  });
 })();
}
function applyRemote(r){
 if(r.chantiers)state.chantiers=r.chantiers;
 if(r.frais)state.frais=r.frais;
 if(r.devis)state.devis=migrateDevis(r.devis);
 if(r.clients)state.clients=r.clients;
 if(r.settings){ if(r.settings.tauxProvision!=null)state.settings.tauxProvision=r.settings.tauxProvision; if(r.settings.deduc)state.settings.deduc=r.settings.deduc; if(r.settings.companyName!=null)state.settings.companyName=r.settings.companyName; }
 state.updatedAt=r.updatedAt||Date.now();
 migrateClientLinks();
 persist(true);
}
function driveFindBackup(token,folderId,cb){
 fetch('https://www.googleapis.com/drive/v3/files?spaces=drive&fields='+encodeURIComponent('files(id,parents)')+'&q='+encodeURIComponent("name='boreas-backup.json' and trashed=false"),{headers:{Authorization:'Bearer '+token}})
  .then(function(r){return r.json();}).then(function(j){
   var f=j&&j.files&&j.files[0]; if(!f)return cb(null);
   if(f.parents&&f.parents.indexOf(folderId)>-1)return cb(f.id);
   var rem=(f.parents||[]).join(',');           // sauvegarde héritée à la racine : la déplacer dans /boreas
   fetch('https://www.googleapis.com/drive/v3/files/'+f.id+'?addParents='+folderId+(rem?'&removeParents='+rem:'')+'&fields=id',{method:'PATCH',headers:{Authorization:'Bearer '+token}})
    .then(function(){cb(f.id);}).catch(function(){cb(f.id);});
  }).catch(function(){cb(null);});
}
function driveDownloadBackup(token,id,cb){
 fetch('https://www.googleapis.com/drive/v3/files/'+id+'?alt=media',{headers:{Authorization:'Bearer '+token}})
  .then(function(r){return r.text();}).then(function(t){ try{cb(JSON.parse(t));}catch(e){cb(false);} }).catch(function(){cb(false);});
}
function driveCreateBackup(token,folderId,payload,cb){
 try{
  var meta={name:'boreas-backup.json',mimeType:'application/json'}; if(folderId)meta.parents=[folderId];
  var fd=new FormData();
  fd.append('metadata',new Blob([JSON.stringify(meta)],{type:'application/json'}));
  fd.append('file',new Blob([JSON.stringify(payload)],{type:'application/json'}));
  fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id',{method:'POST',headers:{Authorization:'Bearer '+token},body:fd})
   .then(function(r){return r.json();}).then(function(j){cb(j&&j.id);}).catch(function(){cb(null);});
 }catch(e){cb(null);}
}
/* Pousse vers /boreas les tickets pas encore sauvegardés sur Drive */
function drivePushPhotos(token,folderId,cb){
 idbKeys(function(keys){
  var todo=keys.slice(), n=0;
  (function next(){
   if(!todo.length)return cb(n);
   var id=todo.shift();
   idbGet(id,function(rec){
    if(!rec||!rec.blob||(rec.drive&&rec.drive.id))return next();
    driveUploadBlob(token,rec.blob,'ticket-'+id+'.jpg',folderId,function(j){
     if(j&&j.id){ rec.drive={id:j.id,link:j.webViewLink||''}; idbPut(rec,function(){ receiptDrive[id]=rec.drive; n++; next(); }); }
     else next();
    });
   });
  })();
 });
}

function drivePushCPhotos(token,folderId,cb){
 idbKeysC(function(keys){
  var todo=keys.slice(), n=0;

   var id=todo.shift();
   idbGetC(id,function(rec){

function driveUpdateBackup(token,id,payload,cb){

  .then(function(r){return r.json();}).then(function(){cb(true);}).catch(function(){cb(false);});

function driveSync(silent,cb){
 var cid=effectiveClientId(); if(!cid)return cb('noconfig');
 if(!navigator.onLine)return cb('offline');
 driveToken(cid,function(token,err){
  if(!token)return cb(silent?'needauth':(err||'auth'));
  driveEnsureFolder(token,function(folderId){
   if(!folderId)return cb('folder');
   state.settings.driveFolderId=folderId; persist(true);
   /* Envoie les photos locales manquantes (tickets + photos de chantiers) puis (ré)écrit le backup */
   var pushAndWrite=function(fid,action){
    drivePushPhotos(token,folderId,function(nUp){
     drivePushCPhotos(token,folderId,function(nUpC){
      gatherReceipts(function(map){
       gatherCPhotos(function(cmap){
        var payload=backupObj(map,cmap), tot=nUp+nUpC;
        if(fid){ driveUpdateBackup(token,fid,payload,function(ok){ if(!ok)return cb('update'); state.settings.driveBackupId=fid; persist(true); cb(null,action,tot,0); }); }
        else { driveCreateBackup(token,folderId,payload,function(id){ if(!id)return cb('create'); state.settings.driveBackupId=id; persist(true); cb(null,action,tot,0); }); }
       });
      });
     });
    });
   };
   driveFindBackup(token,folderId,function(fid){
    if(!fid){ pushAndWrite(null,'uploaded'); return; }
    state.settings.driveBackupId=fid;
    driveDownloadBackup(token,fid,function(remote){
     if(remote===false)return cb('download');
     var lt=state.updatedAt||0, rt=(remote&&remote.updatedAt)||0;
     if(rt>lt){
       applyRemote(remote);
       downloadMissingPhotos(token,remote.receipts,function(nDown){
        downloadMissingCPhotos(token,remote.cphotos,function(nDownC){
         drivePushPhotos(token,folderId,function(nUp){        // photos locales éventuelles, sans écraser les données distantes
          drivePushCPhotos(token,folderId,function(nUpC){
           var tot=nUp+nUpC, totDown=nDown+nDownC;
           if(tot>0){ gatherReceipts(function(map){ gatherCPhotos(function(cmap){ driveUpdateBackup(token,fid,backupObj(map,cmap),function(){ cb(null,'pulled',tot,totDown); }); }); }); }
           else cb(null,'pulled',0,totDown);
          });
         });
        });
       });
     }
     else if(lt>rt){ pushAndWrite(fid,'pushed'); }
     else { // à jour : pousser d'éventuelles photos locales non sauvegardées
       drivePushPhotos(token,folderId,function(nUp){
        drivePushCPhotos(token,folderId,function(nUpC){
         var tot=nUp+nUpC;
         if(tot>0){ gatherReceipts(function(map){ gatherCPhotos(function(cmap){ driveUpdateBackup(token,fid,backupObj(map,cmap),function(){ cb(null,'insync',tot,0); }); }); }); }
         else cb(null,'insync',0,0);
        });
       });
     }
    });
   });
  });
 },silent);
}

/* ============ Sauvegarde locale complète (fichier .json, indépendante de Drive) ============ */
/* Convertit un Blob en base64 (pour embarquer les photos de tickets dans le fichier de sauvegarde) */
function blobToB64(blob,cb){
 try{
  var r=new FileReader();
  r.onload=function(){ cb(String(r.result).split(',')[1]||null); };
  r.onerror=function(){ cb(null); };
  r.readAsDataURL(blob);
 }catch(e){cb(null);}
}
function b64ToBlob(b64,type,cb){
 try{
  var bin=atob(b64), arr=new Uint8Array(bin.length);
  for(var i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);
  cb(new Blob([arr],{type:type||'image/jpeg'}));
 }catch(e){cb(null);}
}
/* Récupère TOUS les tickets locaux (blob -> base64) pour les inclure dans l'archive */
function gatherReceiptsB64(cb){
 idbKeys(function(keys){
  var todo=keys.slice(), out={};
  (function next(){
   if(!todo.length)return cb(out);
   var id=todo.shift();
   idbGet(id,function(rec){
    if(!rec||!rec.blob)return next();
    blobToB64(rec.blob,function(b64){ if(b64)out[id]={b64:b64,drive:rec.drive||null}; next(); });
   });
  })();
 });
}
/* Idem pour les photos de chantiers */
function gatherCPhotosB64(cb){
 idbKeysC(function(keys){
  var todo=keys.slice(), out={};
  (function next(){
   if(!todo.length)return cb(out);
   var id=todo.shift();
   idbGetC(id,function(rec){
    if(!rec||!rec.blob)return next();
    blobToB64(rec.blob,function(b64){ if(b64)out[id]={b64:b64,chantierId:rec.chantierId||null,drive:rec.drive||null}; next(); });
   });
  })();
 });
}
function fullBackupBuild(cb){

    settings:{
     companyName:state.settings.companyName, tauxProvision:state.settings.tauxProvision,
     deduc:state.settings.deduc, driveClientId:state.settings.driveClientId
    },
    receipts:receipts, cphotos:cphotos
   });
  });
 });
}

   var name='boreas-sauvegarde-'+todayISO()+'.json';
   var file=new File([blob],name,{type:'application/json'});
   state.settings.lastLocalBackup=Date.now(); persist(true);
   var s=$('backupStatus'); if(s)s.textContent=backupStatusText();
   if(!silent&&navigator.canShare&&navigator.canShare({files:[file]})&&navigator.share){
    navigator.share({files:[file],title:'Sauvegarde Boreas',text:'Sauvegarde complète du '+frDate(todayISO())}).catch(function(){});
   } else {
    downloadBlob(blob,name);
    if(!silent)toast('Sauvegarde téléchargée. Range-la dans un dossier sûr (Fichiers/Drive/iCloud).');
   }
  }catch(e){ if(!silent)alert('Sauvegarde impossible : '+e.message); }
 });

function importFullBackup(file){

 reader.onload=function(){
  var data; try{data=JSON.parse(String(reader.result));}catch(e){ alert('Fichier invalide ou corrompu.'); return; }
  if(!data||data.app!=='boreas'){ alert('Ce fichier ne semble pas être une sauvegarde Boreas.'); return; }
  state.chantiers=data.chantiers||[];
  state.frais=data.frais||[];
  state.devis=migrateDevis(data.devis||SEED.devis);
  state.clients=data.clients||[];
  state.settings=state.settings||{};
  if(data.settings){
   state.settings.companyName=data.settings.companyName||'';
   state.settings.tauxProvision=data.settings.tauxProvision!=null?data.settings.tauxProvision:55;
   state.settings.deduc=data.settings.deduc||{};
   if(data.settings.driveClientId)state.settings.driveClientId=data.settings.driveClientId;
  }
  state.updatedAt=data.updatedAt||Date.now();
  migrateClientLinks();
  persist(true);
  var rIds=Object.keys(data.receipts||{});
  var restoreReceipts=function(cb2){
   var todo=rIds.slice(), done=0;
   (function next(){
    if(!todo.length)return cb2(done);
    var id=todo.shift(), rec=data.receipts[id];
    b64ToBlob(rec.b64,'image/jpeg',function(blob){
     if(!blob)return next();
     idbPut({id:id,blob:blob,drive:rec.drive||null},function(ok){ if(ok){receiptIds[id]=true; if(rec.drive)receiptDrive[id]=rec.drive; done++;} next(); });
    });
   })();
  };
  var cIds=Object.keys(data.cphotos||{});
  var restoreCPhotos=function(cb2){
   var todo=cIds.slice(), done=0;
   (function next(){
    if(!todo.length)return cb2(done);
    var id=todo.shift(), rec=data.cphotos[id];
    b64ToBlob(rec.b64,'image/jpeg',function(blob){
     if(!blob)return next();
     idbPutC({id:id,chantierId:rec.chantierId||null,blob:blob,drive:rec.drive||null},function(ok){ if(ok){cphotoIds[id]=true;done++;} next(); });
    });
   })();
  };
  restoreReceipts(function(nR){
   restoreCPhotos(function(nC){
    toast('Sauvegarde restaurée ('+(data.chantiers||[]).length+' chantiers, '+(data.frais||[]).length+' frais, '+nR+' tickets, '+nC+' photos).');
    render();
   });
  });
 };
 reader.onerror=function(){ alert('Lecture du fichier impossible.'); };
 reader.readAsText(file);
}

 return 'Dernière sauvegarde locale : '+new Date(l).toLocaleString('fr-BE',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});

/* Âge (en jours) de la protection la plus récente : soit Drive, soit export local */
function daysSinceLastProtection(){
 var t=Math.max(state.settings.lastSync||0,state.settings.lastLocalBackup||0);
 if(!t)return Infinity;
 return Math.floor((Date.now()-t)/86400000);
}

/* ============ Génération PDF (sans dépendance externe) ============ */
function euroPDF(n){ n=Math.round((Number(n)||0)*100)/100; var s=n.toFixed(2).replace('.',','); var p=s.split(','); p[0]=p[0].replace(/\B(?=(\d{3})+(?!\d))/g,' '); return p.join(',')+' EUR'; }
function pdfEsc(s){ return String(s==null?'':s).replace(/\\/g,'\\\\').replace(/\(/g,'\\(').replace(/\)/g,'\\)').replace(/[^\x00-\xFF]/g,function(c){return c==='€'?'EUR':(c==='’'||c==='‘')?"'":(c==='–'||c==='—')?'-':'?';}); }
/* Palette reprise du thème de l'app (cyan/gris), adaptée pour un fond blanc imprimable */
var PDFC={dark:[0.06,0.09,0.16],muted:[0.42,0.47,0.55],cyan:[0.031,0.569,0.698],light:[0.90,0.92,0.95],white:[1,1,1]};
/* Moteur de mise en page : traite une liste d'éléments (text/row/itemrow/rule/totalbox)
   du haut vers le bas de la page, en gérant couleurs, filets et blocs mis en évidence. */
function makePDF(ops){
 var y=800, cs='';
 function col3(c){ return c[0].toFixed(3)+' '+c[1].toFixed(3)+' '+c[2].toFixed(3); }
 function txt(x,yy,s,size,bold,color){ if(s==='')return; cs+=col3(color||PDFC.dark)+' rg\nBT /'+(bold?'F2':'F1')+' '+size+' Tf '+x.toFixed(1)+' '+yy.toFixed(1)+' Td ('+pdfEsc(s)+') Tj ET\n'; }
 function rect(x,yy,w,h,color){ cs+=col3(color)+' rg\n'+x.toFixed(1)+' '+yy.toFixed(1)+' '+w.toFixed(1)+' '+h.toFixed(1)+' re f\n'; }
 function rule(yy,color,lw){ cs+=col3(color||PDFC.light)+' RG\n'+(lw||1)+' w\n55 '+yy.toFixed(1)+' m 540 '+yy.toFixed(1)+' l S\n'; }
 for(var i=0;i<ops.length;i++){
  var o=ops[i], size=o.size||11;
  if(o.gap)y-=o.gap;
  if(o.type==='row'){
   txt(60,y,o.left,size,o.bold,o.color); txt(o.valueX||420,y,o.right,size,o.bold,o.color);
   y-=size*1.55;
  } else if(o.type==='itemrow'){
   if(o.shaded)rect(55,y-4,485,size*1.55+2,PDFC.light);
   txt(65,y,o.left,size,false,PDFC.dark); txt(o.valueX||420,y,o.right,size,false,PDFC.dark);
   y-=size*1.55;
  } else if(o.type==='rule'){
   rule(y+4,o.color,o.width); y-=6;
  } else if(o.type==='totalbox'){
   var h=size+16;
   rect(55,y-8,485,h,o.color||PDFC.cyan);
   txt(70,y,o.left,size,true,PDFC.white); txt(o.valueX||380,y,o.right,size,true,PDFC.white);
   y-=h+8;
  } else { // 'text' par défaut : simple ligne
   txt(o.x||60,y,o.t,size,o.bold,o.color); y-=size*1.55;
  }
 }
 var objs=[
  '<< /Type /Catalog /Pages 2 0 R >>',
  '<< /Type /Pages /Kids [3 0 R] /Count 1 >>',
  '<< /Type /Page /Parent 2 0 R /MediaBox [0 0 595 842] /Resources << /Font << /F1 5 0 R /F2 6 0 R >> >> /Contents 4 0 R >>',
  '<< /Length '+cs.length+' >>\nstream\n'+cs+'endstream',
  '<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica /Encoding /WinAnsiEncoding >>',
  '<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica-Bold /Encoding /WinAnsiEncoding >>'
 ];
 var pdf='%PDF-1.4\n', off=[];
 for(var k=0;k<objs.length;k++){ off.push(pdf.length); pdf+=(k+1)+' 0 obj\n'+objs[k]+'\nendobj\n'; }
 var xref=pdf.length; pdf+='xref\n0 '+(objs.length+1)+'\n0000000000 65535 f \n';
 for(var x=0;x<off.length;x++){ var s=''+off[x]; while(s.length<10)s='0'+s; pdf+=s+' 00000 n \n'; }
 pdf+='trailer\n<< /Size '+(objs.length+1)+' /Root 1 0 R >>\nstartxref\n'+xref+'\n%%EOF';
 var bytes=new Uint8Array(pdf.length); for(var b=0;b<pdf.length;b++)bytes[b]=pdf.charCodeAt(b)&0xff;
 return new Blob([bytes],{type:'application/pdf'});
}
function downloadBlob(blob,name){ try{ var u=URL.createObjectURL(blob); var a=document.createElement('a'); a.href=u; a.download=name; document.body.appendChild(a); a.click(); setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(u);},1500); }catch(e){ alert('Téléchargement impossible : '+e.message); } }
function sharePDF(blob,name,title,text){
 try{ var file=new File([blob],name,{type:'application/pdf'});
  if(navigator.canShare&&navigator.canShare({files:[file]})&&navigator.share){ navigator.share({files:[file],title:title,text:text||''}).catch(function(){}); return; }
 }catch(e){}
 downloadBlob(blob,name); toast('PDF téléchargé (partage natif indisponible ici).');
}

var ui={tab:'dashboard',chantierForm:false,editingChantierId:null,chantierLignes:[],fraisForm:false,settings:false,driveAdv:false,filter:'tous',cStatut:'en_cours',fCat:CATEGORIES[0].key,clientSearch:'',selectedClientId:null};

/* ============ Finance ============ */
function finance(){
 var ca=state.chantiers.filter(function(c){return c.statut==='paye';}).reduce(function(s,c){return s+(Number(c.montant)||0);},0);
 var fraisReel=state.frais.reduce(function(s,f){return s+(Number(f.montant)||0);},0);
 var fraisDeduc=state.frais.reduce(function(s,f){return s+(Number(f.montant)||0)*(deducOf(f.categorie)/100);},0);
 var benefice=ca-fraisDeduc;                 // bénéfice net fiscal (base imposable)
 var taux=(Number(state.settings.tauxProvision)||0)/100;
 var provision=benefice>0?benefice*taux:0;
 var reste=ca-fraisReel-provision;           // trésorerie réelle en poche
 return{ca:ca,frais:fraisReel,fraisReel:fraisReel,fraisDeduc:fraisDeduc,benefice:benefice,provision:provision,reste:reste,taux:state.settings.tauxProvision};
}
function tvaColor(ca){return ca>=23000?'var(--red)':ca>=18000?'var(--orange)':'var(--green)';}
function tvaHex(ca){return ca>=23000?'#ef4444':ca>=18000?'#f59e0b':'#10b981';}
function tvaLabel(ca){return ca>=23000?'Zone rouge':ca>=18000?'Vigilance':'Marge confortable';}

 +'<div class="icobox" style="width:32px;height:32px;background:'+color+'22;color:'+color+'">'+ico(icon,17)+'</div>'
 +'<span class="muted" style="font-size:12px" class="trunc">'+label+'</span></div>'
 +'<div class="v" style="color:'+color+'">'+value+'</div>'
 +(sub?'<div class="muted2" style="font-size:11px;margin-top:2px">'+sub+'</div>':'')+'</div>';

function gaugeSVG(ca){
 var r=78,c=2*Math.PI*r,pct=Math.min(ca/TVA_LIMIT,1),col=tvaHex(ca);
 return '<div style="position:relative;display:flex;align-items:center;justify-content:center;padding:6px 0">'
 +'<svg width="200" height="200" viewBox="0 0 200 200" style="transform:rotate(-90deg)">'
 +'<circle cx="100" cy="100" r="'+r+'" stroke="#22304a" stroke-width="16" fill="none"/>'
 +'<circle cx="100" cy="100" r="'+r+'" stroke="'+col+'" stroke-width="16" fill="none" stroke-linecap="round" stroke-dasharray="'+c+'" stroke-dashoffset="'+(c*(1-pct))+'"/></svg>'
 +'<div style="position:absolute;display:flex;flex-direction:column;align-items:center">'
 +'<span style="font-size:30px;font-weight:700;color:'+col+'">'+fmt(ca)+'</span>'

 +'<span class="chip" style="margin-top:8px;color:'+col+';background:'+col+'22">'+tvaLabel(ca)+'</span></div></div>';
}

 +'<div class="row" style="align-items:flex-start;gap:10px">'
 +'<div class="icobox" style="width:34px;height:34px;background:rgba(245,158,11,.15);color:var(--orange);flex-shrink:0">'+ico('cloud',18)+'</div>'

 +'<p class="muted" style="font-size:12px;margin-top:2px">Exporte une sauvegarde locale ou synchronise ton Drive pour ne pas risquer de perdre tes données.</p>'
 +'<button class="btn btn-primary" style="margin-top:10px;padding:9px 12px;font-size:12px" onclick="B.setTab(\'settings\')">Aller aux réglages</button></div></div></div>';

/* Génère les lignes de facturation d'un chantier (libellé + montant) */
function ligneRows(lignes){
 if(!lignes.length)return '<p class="muted2" style="font-size:11px">Aucune ligne. Montant total à saisir manuellement ci-dessous.</p>';
 return lignes.map(function(l){
  return '<div class="row" style="margin-bottom:6px;align-items:center">'
   +'<input class="input" id="cl_lib_'+l.id+'" value="'+esc(l.libelle)+'" placeholder="Ex: Pompe de relevage condensats" style="flex:2" oninput="B.onLigneInput(\''+l.id+'\')"/>'
   +'<input class="input" id="cl_mt_'+l.id+'" type="number" inputmode="decimal" value="'+esc(l.montant)+'" placeholder="0" style="flex:1;text-align:right" oninput="B.onLigneInput(\''+l.id+'\')"/>'
   +'<button class="btn btn-ghost" style="padding:10px;color:var(--red)" onclick="B.removeLigne(\''+l.id+'\')">'+ico('trash',15)+'</button></div>';
 }).join('');
}

var B={
 setTab:function(t){ if(ui.tab==='devis')B.saveDevis(); ui.tab=t; ui.settings=false; render(); },
 setCompany:function(v){ state.settings.companyName=v||''; persist(); },
 setTaux:function(v){ state.settings.tauxProvision=Number(v); persist(); var l=$('tauxLbl'); if(l)l.textContent=v+'%'; },
 dedChange:function(i,key){
   var cont=$('dedact_'+i), inp=$('ded_'+i); if(!cont||!inp)return;
   var val=inp.value, n=Number(val);
   if(val===''||isNaN(n)||n===deducOf(key)){ cont.innerHTML=''; return; }
   var kk=key.replace(/'/g,"\\'");
   cont.innerHTML='<button style="background:var(--cyan);color:#06222b;font-weight:700;font-size:11px;padding:6px 9px;border-radius:8px" onclick="B.dedValidate('+i+',\''+kk+'\')">Valider</button>';
 },
 dedValidate:function(i,key){
   var cont=$('dedact_'+i); if(!cont)return; var kk=key.replace(/'/g,"\\'");
   cont.innerHTML='<button style="background:var(--orange);color:#3a2606;font-weight:700;font-size:11px;padding:6px 9px;border-radius:8px" onclick="B.dedConfirm('+i+',\''+kk+'\')">Confirmer&nbsp;?</button>'
     +'<button style="color:var(--muted);padding:4px" onclick="B.dedCancel('+i+',\''+kk+'\')">'+ico('x',15)+'</button>';
 },
 dedConfirm:function(i,key){
   var inp=$('ded_'+i), cont=$('dedact_'+i); if(!inp)return;
   var n=Math.max(0,Math.min(100,Number(inp.value)||0));
   if(!state.settings.deduc)state.settings.deduc={};
   state.settings.deduc[key]=n; persist(); inp.value=n;
   if(cont){ cont.innerHTML='<span style="display:flex;align-items:center;color:var(--green)">'+ico('check',17,'var(--green)')+'</span>';
     setTimeout(function(){var c2=$('dedact_'+i); if(c2)c2.innerHTML='';},1200); }
 },
 dedCancel:function(i,key){
   var inp=$('ded_'+i), cont=$('dedact_'+i);
   if(inp)inp.value=deducOf(key); if(cont)cont.innerHTML='';
 },
 toggleForm:function(w){ if(w==='chantier'){ ui.chantierForm=!ui.chantierForm; ui.editingChantierId=null; ui.chantierLignes=[]; if(ui.chantierForm)ui.cStatut='en_cours'; } else {ui.fraisForm=!ui.fraisForm; pendingBlob=null;} render(); },
 setFilter:function(f){ ui.filter=f; render(); },
 setCStatut:function(s){ ui.cStatut=s; var b=$('c_stat').children; b[0].className='selbtn'+(s==='en_cours'?' active':''); b[1].className='selbtn'+(s==='paye'?' active':''); },
 setFCat:function(k){ ui.fCat=k; },
 editChantier:function(id){
   var c=state.chantiers.filter(function(x){return x.id===id;})[0]; if(!c)return;

 /* --- export --- */
 exportCSV:function(){
   function q(s){s=String(s==null?'':s);return /[";\r\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s;}
   var f=finance(), sep=';', L=[];
   var comp=(state.settings.companyName||'').trim();
   if(comp)L.push(q(comp));
   L.push('BOREAS ASSISTANT - Export du '+todayISO());
   L.push('');
   L.push('RESUME');
   L.push('CA encaisse'+sep+f.ca);
   L.push('Total frais reels'+sep+f.fraisReel);
   L.push('Frais deductibles'+sep+Math.round(f.fraisDeduc));
   L.push('Benefice net (base imposable)'+sep+Math.round(f.benefice));
   L.push('Provision '+f.taux+'%'+sep+Math.round(f.provision));
   L.push('Reste en poche'+sep+Math.round(f.reste));
   L.push('');
   L.push('CHANTIERS');
   L.push(['Date','Client','Description','Montant','Statut'].join(sep));
   state.chantiers.slice().sort(function(a,b){return(a.date||'').localeCompare(b.date||'');}).forEach(function(c){
     L.push([c.date,q(c.client),q(c.description),c.montant,c.statut==='paye'?'Paye':'En cours'].join(sep));
   });
   var chantiersAvecLignes=state.chantiers.filter(function(c){return c.lignes&&c.lignes.length;});
   if(chantiersAvecLignes.length){
    L.push('');
    L.push('LIGNES DE FACTURATION DETAILLEES');
    L.push(['Date','Client','Ligne','Montant'].join(sep));
    chantiersAvecLignes.slice().sort(function(a,b){return(a.date||'').localeCompare(b.date||'');}).forEach(function(c){
      c.lignes.forEach(function(l){
        L.push([c.date,q(c.client),q(l.libelle),l.montant].join(sep));
      });
    });
   }
   L.push('');
   L.push('FRAIS');
   L.push(['Date','Libelle','Categorie','Montant','% Deduc','Deductible'].join(sep));
   state.frais.slice().sort(function(a,b){return(a.date||'').localeCompare(b.date||'');}).forEach(function(i){
     var pd=deducOf(i.categorie);
     L.push([i.date,q(i.libelle),q(i.categorie),i.montant,pd,Math.round((Number(i.montant)||0)*pd/100)].join(sep));
   });
   var csv='﻿'+L.join('\r\n');
   try{
     var blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
     var url=URL.createObjectURL(blob);
     var a=document.createElement('a');
     a.href=url; a.download='boreas-export-'+todayISO()+'.csv';
     document.body.appendChild(a); a.click();
     setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(url);},1500);
   }catch(e){ alert('Export impossible sur ce navigateur : '+e.message); }
 },

   if(comp)L.push({t:comp,size:19,bold:true});
   L.push({t:'RÉCAPITULATIF',size:13,bold:true,color:PDFC.cyan,gap:comp?10:0});
   L.push({type:'rule',gap:8});
   L.push({t:'Au '+frDate(todayISO()),size:11,gap:8});
   var rows=[
    ['CA encaisse',euroPDF(f.ca)],
    ['Total frais réels',euroPDF(f.fraisReel)],
    ['Frais déductibles',euroPDF(f.fraisDeduc)],
    ['Bénéfice net (base imposable)',euroPDF(f.benefice)],
    ['Provision '+f.taux+'%',euroPDF(f.provision)]
   ];
   rows.forEach(function(r,i){ L.push({type:'itemrow',left:r[0],right:r[1],size:11,shaded:i%2===1,gap:i===0?16:0,valueX:400}); });
   L.push({type:'rule',gap:12});
   L.push({type:'totalbox',left:'RESTE EN POCHE',right:euroPDF(f.reste),size:15,gap:6,valueX:340});
   L.push({t:'Plafond franchise TVA : '+euroPDF(f.ca)+' / '+euroPDF(TVA_LIMIT),size:11,color:PDFC.muted,gap:20});
   L.push({t:'Chantiers payés : '+state.chantiers.filter(function(c){return c.statut==='paye';}).length,size:11,color:PDFC.muted,gap:6});
   L.push({t:'Chantiers en cours : '+state.chantiers.filter(function(c){return c.statut!=='paye';}).length,size:11,color:PDFC.muted});
   L.push({t:'Frais enregistrés : '+state.frais.length,size:11,color:PDFC.muted});
   sharePDF(makePDF(L),'recap-'+todayISO()+'.pdf','Recapitulatif'+(comp?' - '+comp:''),'Recapitulatif comptable'+(comp?' - '+comp:''));
 }
};
window.B=B;
render();
/* Auto-synchronisation au lancement (silencieuse ; retombe sur le bouton manuel si l'autorisation est requise) */
if(effectiveClientId()){ setTimeout(function(){ B.syncNow(true); }, 700); }
</script>
