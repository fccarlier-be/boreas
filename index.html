<style>
:root{
  --bg:#0a0f1a; --card:#141c2b; --card2:#1b2536; --border:#26324a;
  --cyan:#06b6d4; --cyan-d:#0891b2; --text:#e5edf5; --muted:#94a3b8; --muted2:#64748b;
  --green:#10b981; --orange:#f59e0b; --red:#ef4444; --pink:#f472b6;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;}
html,body{background:var(--bg);color:var(--text);-webkit-text-size-adjust:100%;}
body{overscroll-behavior:none;}
button{cursor:pointer;border:none;background:none;color:inherit;font-size:inherit;}
input,select,textarea{font-size:16px;font-family:inherit;}
::-webkit-scrollbar{display:none;}
#app{max-width:460px;margin:0 auto;min-height:100vh;padding-top:env(safe-area-inset-top);padding-bottom:92px;}
main{padding:14px 16px 16px;}
h1{font-size:19px;font-weight:700;}
.muted{color:var(--muted);} .muted2{color:var(--muted2);}
.row{display:flex;gap:12px;} .between{display:flex;align-items:center;justify-content:space-between;}
.mb1{margin-bottom:4px;}.mb2{margin-bottom:12px;}.mb3{margin-bottom:16px;}.mb4{margin-bottom:20px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:18px;}
.pad{padding:16px;}
.pop{animation:pop .18s ease-out;} @keyframes pop{from{transform:scale(.97);opacity:.3}to{transform:scale(1);opacity:1}}
.icobox{border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.label{font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);margin-bottom:6px;display:block;}
.field{margin-bottom:12px;}
.input{width:100%;min-width:0;background:#0c1320;border:1px solid var(--border);border-radius:12px;padding:12px 14px;color:var(--text);outline:none;box-sizing:border-box;}
.input:focus{border-color:var(--cyan);}
select.input{appearance:none;-webkit-appearance:none;padding-right:38px;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%2394a3b8' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'/></svg>");background-repeat:no-repeat;background-position:right 12px center;}
.btn{border-radius:12px;padding:13px;font-weight:700;text-align:center;display:flex;align-items:center;justify-content:center;gap:8px;transition:.1s;}
.btn:active{transform:scale(.98);}
.btn-primary{background:var(--cyan);color:#06222b;}
.btn-ghost{background:var(--card2);border:1px solid var(--border);color:var(--text);font-weight:600;}
.chip{font-size:10px;padding:3px 9px;border-radius:999px;font-weight:600;}
.seg{display:flex;gap:8px;} .seg button{flex:1;border-radius:10px;padding:9px 4px;font-size:13px;font-weight:600;background:#0c1320;color:var(--muted);border:1px solid transparent;}
.seg button.active{background:var(--card2);color:#fff;}
.selbtn{border:1px solid var(--border);border-radius:12px;padding:11px 8px;display:flex;align-items:center;justify-content:center;gap:6px;font-size:13px;font-weight:600;color:var(--muted);min-width:0;overflow:hidden;}
.selbtn.active{border-color:var(--cyan);background:rgba(6,182,212,.12);color:#67e8f9;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.stat{flex:1;min-width:0;}
.stat .v{font-size:20px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bar{height:8px;border-radius:999px;background:#22304a;overflow:hidden;}
.bar>span{display:block;height:100%;border-radius:999px;transition:width .6s;}
.listitem{padding:14px;} .trunc{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
input[type=range]{-webkit-appearance:none;height:6px;border-radius:999px;background:#22304a;outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:var(--cyan);border:3px solid #06222b;}
nav{position:fixed;bottom:0;left:0;right:0;background:rgba(10,15,26,.96);backdrop-filter:blur(12px);border-top:1px solid var(--border);padding-bottom:env(safe-area-inset-bottom);z-index:30;}
nav .inner{max-width:460px;margin:0 auto;display:flex;}
nav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 0 8px;color:var(--muted2);}
nav button.active{color:var(--cyan);}
nav .lbl{font-size:10px;font-weight:600;}
.overlay{position:fixed;inset:0;background:rgba(4,8,15,.72);z-index:40;display:flex;align-items:flex-end;}
.sheet{background:var(--card);border-top-left-radius:22px;border-top-right-radius:22px;border:1px solid var(--border);width:100%;max-width:460px;margin:0 auto;padding:20px 16px calc(24px + env(safe-area-inset-bottom));animation:up .22s ease-out;}
@keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
svg{display:block;}
.thumb{border:1px solid var(--border);border-radius:12px;overflow:hidden;position:relative;display:inline-block;}
.thumb img{display:block;width:88px;height:88px;object-fit:cover;}
.thumb .del{position:absolute;top:4px;right:4px;width:24px;height:24px;border-radius:50%;background:rgba(4,8,15,.8);color:#fff;display:flex;align-items:center;justify-content:center;}
.modal{position:fixed;inset:0;background:rgba(4,8,15,.92);z-index:60;display:flex;flex-direction:column;padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);}
.modal .imgwrap{flex:1;min-height:0;display:flex;align-items:center;justify-content:center;padding:16px;overflow:auto;}
.modal img{max-width:100%;max-height:100%;border-radius:12px;}
.modal .bar{display:flex;gap:10px;padding:12px 16px;}
#toast{position:fixed;left:0;right:0;bottom:104px;display:flex;justify-content:center;z-index:70;pointer-events:none;}
#toast .t{background:var(--card2);border:1px solid var(--border);color:var(--text);padding:10px 16px;border-radius:12px;font-size:13px;box-shadow:0 8px 24px rgba(0,0,0,.45);opacity:0;transform:translateY(8px);transition:.25s;max-width:88%;text-align:center;}
#toast .t.show{opacity:1;transform:none;}
</style>

/* ============ Justificatifs : IndexedDB ============ */
var DB=null, DBERR=false;
function idbOpen(cb){
 if(DB)return cb(DB); if(DBERR||!window.indexedDB)return cb(null);
 try{
  var r=indexedDB.open('boreas_db',1);
  r.onupgradeneeded=function(e){var db=e.target.result; if(!db.objectStoreNames.contains('receipts'))db.createObjectStore('receipts',{keyPath:'id'});};
  r.onsuccess=function(e){DB=e.target.result;cb(DB);};
  r.onerror=function(){DBERR=true;cb(null);};
 }catch(e){DBERR=true;cb(null);}
}
function idbPut(rec,cb){idbOpen(function(db){if(!db)return cb&&cb(false);try{var t=db.transaction('receipts','readwrite');t.objectStore('receipts').put(rec);t.oncomplete=function(){cb&&cb(true);};t.onerror=function(){cb&&cb(false);};}catch(e){cb&&cb(false);}});}
function idbGet(id,cb){idbOpen(function(db){if(!db)return cb(null);try{var r=db.transaction('receipts').objectStore('receipts').get(id);r.onsuccess=function(){cb(r.result||null);};r.onerror=function(){cb(null);};}catch(e){cb(null);}});}
function idbDel(id,cb){idbOpen(function(db){if(!db)return cb&&cb(false);try{var t=db.transaction('receipts','readwrite');t.objectStore('receipts').delete(id);t.oncomplete=function(){cb&&cb(true);};t.onerror=function(){cb&&cb(false);};}catch(e){cb&&cb(false);}});}
function idbKeys(cb){idbOpen(function(db){if(!db)return cb([]);try{var r=db.transaction('receipts').objectStore('receipts').getAllKeys();r.onsuccess=function(){cb(r.result||[]);};r.onerror=function(){cb([]);};}catch(e){cb([]);}});}

/* Compression via canvas (max 1400px, JPEG 0.7) */
function compressImage(file,cb){
 try{
  var img=new Image(), url=URL.createObjectURL(file);
  img.onload=function(){
   var max=1400,w=img.width,h=img.height;
   if(w>h&&w>max){h=Math.round(h*max/w);w=max;} else if(h>=w&&h>max){w=Math.round(w*max/h);h=max;}
   var cv=document.createElement('canvas');cv.width=w;cv.height=h;
   cv.getContext('2d').drawImage(img,0,0,w,h);
   URL.revokeObjectURL(url);
   cv.toBlob(function(b){cb(b);}, 'image/jpeg', 0.7);
  };
  img.onerror=function(){URL.revokeObjectURL(url);cb(null);};
  img.src=url;
 }catch(e){cb(null);}
}

function loadScript(src,cb){
 if(document.querySelector('script[src="'+src+'"]'))return cb(true);
 var s=document.createElement('script');s.src=src;s.async=true;
 s.onload=function(){cb(true);};s.onerror=function(){cb(false);};
 document.head.appendChild(s);
}
var driveTok=null, driveTokExp=0;
function driveToken(clientId,cb,silent){
 if(driveTok&&Date.now()<driveTokExp-60000)return cb(driveTok);

   });

function driveUploadBlob(token,blob,name,parentId,cb){

   method:'POST',headers:{Authorization:'Bearer '+token},body:fd
  }).then(function(r){return r.json();}).then(function(j){cb(j);}).catch(function(e){cb(null,e.message);});
 }catch(e){cb(null,e.message);}

/* Dossier "boreas" dédié (créé par l'app, accessible via scope drive.file) */
function driveEnsureFolder(token,cb){
 var q="name='boreas' and mimeType='application/vnd.google-apps.folder' and trashed=false";
 fetch('https://www.googleapis.com/drive/v3/files?spaces=drive&fields='+encodeURIComponent('files(id)')+'&q='+encodeURIComponent(q),{headers:{Authorization:'Bearer '+token}})
  .then(function(r){return r.json();}).then(function(j){
   if(j&&j.files&&j.files[0])return cb(j.files[0].id);
   fetch('https://www.googleapis.com/drive/v3/files?fields=id',{method:'POST',headers:{Authorization:'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify({name:'boreas',mimeType:'application/vnd.google-apps.folder'})})
    .then(function(r){return r.json();}).then(function(j2){cb(j2&&j2.id);}).catch(function(){cb(null);});
  }).catch(function(){cb(null);});

function backupObj(map){ return {updatedAt:state.updatedAt,chantiers:state.chantiers,frais:state.frais,devis:state.devis,settings:{tauxProvision:state.settings.tauxProvision,deduc:state.settings.deduc,companyName:state.settings.companyName},receipts:map||{}}; }
/* Construit la table fraisId -> idDriveDuTicket depuis IndexedDB */
function gatherReceipts(cb){
 idbKeys(function(keys){
  var todo=keys.slice(), map={};
  (function next(){ if(!todo.length)return cb(map); var id=todo.shift(); idbGet(id,function(rec){ if(rec&&rec.drive&&rec.drive.id)map[id]=rec.drive.id; next(); }); })();
 });
}
/* Télécharge depuis Drive les tickets absents localement (restauration nouvel appareil) */
function driveDownloadFile(token,fileId,cb){
 fetch('https://www.googleapis.com/drive/v3/files/'+fileId+'?alt=media',{headers:{Authorization:'Bearer '+token}})
  .then(function(r){return r.blob();}).then(function(b){cb(b);}).catch(function(){cb(null);});
}
function downloadMissingPhotos(token,map,cb){
 if(!map)return cb(0);
 var ids=Object.keys(map), n=0;
 (function next(){
  if(!ids.length)return cb(n);
  var fid=ids.shift(), drvId=map[fid];
  if(receiptIds[fid]||!drvId)return next();
  driveDownloadFile(token,drvId,function(blob){
   if(!blob)return next();
   idbPut({id:fid,blob:blob,drive:{id:drvId,link:''}},function(ok){ if(ok){receiptIds[fid]=true;receiptDrive[fid]={id:drvId,link:''};n++;} next(); });
  });
 })();
}
function applyRemote(r){
 if(r.chantiers)state.chantiers=r.chantiers;
 if(r.frais)state.frais=r.frais;
 if(r.devis)state.devis=r.devis;
 if(r.settings){ if(r.settings.tauxProvision!=null)state.settings.tauxProvision=r.settings.tauxProvision; if(r.settings.deduc)state.settings.deduc=r.settings.deduc; if(r.settings.companyName!=null)state.settings.companyName=r.settings.companyName; }
 state.updatedAt=r.updatedAt||Date.now();
 persist(true);
}
function driveFindBackup(token,folderId,cb){
 fetch('https://www.googleapis.com/drive/v3/files?spaces=drive&fields='+encodeURIComponent('files(id,parents)')+'&q='+encodeURIComponent("name='boreas-backup.json' and trashed=false"),{headers:{Authorization:'Bearer '+token}})
  .then(function(r){return r.json();}).then(function(j){
   var f=j&&j.files&&j.files[0]; if(!f)return cb(null);
   if(f.parents&&f.parents.indexOf(folderId)>-1)return cb(f.id);
   var rem=(f.parents||[]).join(',');           // sauvegarde héritée à la racine : la déplacer dans /boreas
   fetch('https://www.googleapis.com/drive/v3/files/'+f.id+'?addParents='+folderId+(rem?'&removeParents='+rem:'')+'&fields=id',{method:'PATCH',headers:{Authorization:'Bearer '+token}})
    .then(function(){cb(f.id);}).catch(function(){cb(f.id);});
  }).catch(function(){cb(null);});
}
function driveDownloadBackup(token,id,cb){
 fetch('https://www.googleapis.com/drive/v3/files/'+id+'?alt=media',{headers:{Authorization:'Bearer '+token}})
  .then(function(r){return r.text();}).then(function(t){ try{cb(JSON.parse(t));}catch(e){cb(false);} }).catch(function(){cb(false);});
}
function driveCreateBackup(token,folderId,payload,cb){
 try{
  var meta={name:'boreas-backup.json',mimeType:'application/json'}; if(folderId)meta.parents=[folderId];
  var fd=new FormData();
  fd.append('metadata',new Blob([JSON.stringify(meta)],{type:'application/json'}));
  fd.append('file',new Blob([JSON.stringify(payload)],{type:'application/json'}));
  fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id',{method:'POST',headers:{Authorization:'Bearer '+token},body:fd})
   .then(function(r){return r.json();}).then(function(j){cb(j&&j.id);}).catch(function(){cb(null);});
 }catch(e){cb(null);}
}
/* Pousse vers /boreas les tickets pas encore sauvegardés sur Drive */
function drivePushPhotos(token,folderId,cb){
 idbKeys(function(keys){
  var todo=keys.slice(), n=0;
  (function next(){
   if(!todo.length)return cb(n);
   var id=todo.shift();
   idbGet(id,function(rec){
    if(!rec||!rec.blob||(rec.drive&&rec.drive.id))return next();
    driveUploadBlob(token,rec.blob,'ticket-'+id+'.jpg',folderId,function(j){
     if(j&&j.id){ rec.drive={id:j.id,link:j.webViewLink||''}; idbPut(rec,function(){ receiptDrive[id]=rec.drive; n++; next(); }); }
     else next();
    });
   });
  })();
 });
}
function driveUpdateBackup(token,id,payload,cb){
 fetch('https://www.googleapis.com/upload/drive/v3/files/'+id+'?uploadType=media',{method:'PATCH',headers:{Authorization:'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify(payload)})
  .then(function(r){return r.json();}).then(function(){cb(true);}).catch(function(){cb(false);});
}
function driveSync(silent,cb){
 var cid=effectiveClientId(); if(!cid)return cb('noconfig');
 if(!navigator.onLine)return cb('offline');
 driveToken(cid,function(token,err){
  if(!token)return cb(silent?'needauth':(err||'auth'));
  driveEnsureFolder(token,function(folderId){
   if(!folderId)return cb('folder');
   state.settings.driveFolderId=folderId; persist(true);
   /* Envoie les photos locales manquantes puis (ré)écrit le backup avec la table receipts */
   var pushAndWrite=function(fid,action){
    drivePushPhotos(token,folderId,function(nUp){
     gatherReceipts(function(map){
      var payload=backupObj(map);
      if(fid){ driveUpdateBackup(token,fid,payload,function(ok){ if(!ok)return cb('update'); state.settings.driveBackupId=fid; persist(true); cb(null,action,nUp,0); }); }
      else { driveCreateBackup(token,folderId,payload,function(id){ if(!id)return cb('create'); state.settings.driveBackupId=id; persist(true); cb(null,action,nUp,0); }); }
     });
    });
   };
   driveFindBackup(token,folderId,function(fid){
    if(!fid){ pushAndWrite(null,'uploaded'); return; }
    state.settings.driveBackupId=fid;
    driveDownloadBackup(token,fid,function(remote){
     if(remote===false)return cb('download');
     var lt=state.updatedAt||0, rt=(remote&&remote.updatedAt)||0;
     if(rt>lt){
       applyRemote(remote);
       downloadMissingPhotos(token,remote.receipts,function(nDown){
        drivePushPhotos(token,folderId,function(nUp){        // photos locales éventuelles, sans écraser les données distantes
         if(nUp>0){ gatherReceipts(function(map){ driveUpdateBackup(token,fid,backupObj(map),function(){ cb(null,'pulled',nUp,nDown); }); }); }
         else cb(null,'pulled',0,nDown);
        });
       });
     }
     else if(lt>rt){ pushAndWrite(fid,'pushed'); }
     else { // à jour : pousser d'éventuelles photos locales non sauvegardées
       drivePushPhotos(token,folderId,function(nUp){
        if(nUp>0){ gatherReceipts(function(map){ driveUpdateBackup(token,fid,backupObj(map),function(){ cb(null,'insync',nUp,0); }); }); }
        else cb(null,'insync',0,0);
       });
     }
    });
   });
  });
 },silent);
}

function toast(msg){ var el=$('toast'); if(!el)return; el.innerHTML='<div class="t">'+esc(msg)+'</div>'; var t=el.firstChild; requestAnimationFrame(function(){t.classList.add('show');}); setTimeout(function(){if(t)t.classList.remove('show');},2800); }

/* ============ Génération PDF (sans dépendance externe) ============ */
function euroPDF(n){ n=Math.round((Number(n)||0)*100)/100; var s=n.toFixed(2).replace('.',','); var p=s.split(','); p[0]=p[0].replace(/\B(?=(\d{3})+(?!\d))/g,' '); return p.join(',')+' EUR'; }
function pdfEsc(s){ return String(s==null?'':s).replace(/\\/g,'\\\\').replace(/\(/g,'\\(').replace(/\)/g,'\\)').replace(/[^\x00-\xFF]/g,function(c){return c==='€'?'EUR':(c==='’'||c==='‘')?"'":(c==='–'||c==='—')?'-':'?';}); }
function makePDF(lines){
 var y=800, cs='';
 for(var i=0;i<lines.length;i++){ var ln=lines[i], size=ln.size||11, font=ln.bold?'F2':'F1'; if(ln.gap)y-=ln.gap; if(ln.t!==''){ cs+='BT /'+font+' '+size+' Tf 60 '+y.toFixed(1)+' Td ('+pdfEsc(ln.t)+') Tj ET\n'; } y-=size*1.55; }
 var o=[
  '<< /Type /Catalog /Pages 2 0 R >>',
  '<< /Type /Pages /Kids [3 0 R] /Count 1 >>',
  '<< /Type /Page /Parent 2 0 R /MediaBox [0 0 595 842] /Resources << /Font << /F1 5 0 R /F2 6 0 R >> >> /Contents 4 0 R >>',
  '<< /Length '+cs.length+' >>\nstream\n'+cs+'endstream',
  '<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica /Encoding /WinAnsiEncoding >>',
  '<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica-Bold /Encoding /WinAnsiEncoding >>'
 ];
 var pdf='%PDF-1.4\n', off=[];
 for(var k=0;k<o.length;k++){ off.push(pdf.length); pdf+=(k+1)+' 0 obj\n'+o[k]+'\nendobj\n'; }
 var xref=pdf.length; pdf+='xref\n0 '+(o.length+1)+'\n0000000000 65535 f \n';
 for(var x=0;x<off.length;x++){ var s=''+off[x]; while(s.length<10)s='0'+s; pdf+=s+' 00000 n \n'; }
 pdf+='trailer\n<< /Size '+(o.length+1)+' /Root 1 0 R >>\nstartxref\n'+xref+'\n%%EOF';
 var bytes=new Uint8Array(pdf.length); for(var b=0;b<pdf.length;b++)bytes[b]=pdf.charCodeAt(b)&0xff;
 return new Blob([bytes],{type:'application/pdf'});
}
function downloadBlob(blob,name){ try{ var u=URL.createObjectURL(blob); var a=document.createElement('a'); a.href=u; a.download=name; document.body.appendChild(a); a.click(); setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(u);},1500); }catch(e){ alert('Téléchargement impossible : '+e.message); } }
function sharePDF(blob,name,title,text){
 try{ var file=new File([blob],name,{type:'application/pdf'});
  if(navigator.canShare&&navigator.canShare({files:[file]})&&navigator.share){ navigator.share({files:[file],title:title,text:text||''}).catch(function(){}); return; }
 }catch(e){}
 downloadBlob(blob,name); toast('PDF téléchargé (partage natif indisponible ici).');
}

function finance(){

 var fraisDeduc=state.frais.reduce(function(s,f){return s+(Number(f.montant)||0)*(deducOf(f.categorie)/100);},0);
 var benefice=ca-fraisDeduc;                 // bénéfice net fiscal (base imposable)

 var reste=ca-fraisReel-provision;           // trésorerie réelle en poche
 return{ca:ca,frais:fraisReel,fraisReel:fraisReel,fraisDeduc:fraisDeduc,benefice:benefice,provision:provision,reste:reste,taux:state.settings.tauxProvision};

 var form=ui.fraisForm?(

  +'<div class="row">'

   var tot=items.reduce(function(s,i){return s+(Number(i.montant)||0);},0);

 }).filter(function(g){return g.items.length;});
 var body=groups.length?groups.map(function(g){

 }).join(''):'<p class="muted2" style="text-align:center;font-size:14px;padding:32px 0">Aucun frais enregistré.</p>';

var B={
 setTab:function(t){ if(ui.tab==='devis')B.saveDevis(); ui.tab=t; ui.settings=false; render(); },
 setCompany:function(v){ state.settings.companyName=v||''; persist(); },
 setTaux:function(v){ state.settings.tauxProvision=Number(v); persist(); var l=$('tauxLbl'); if(l)l.textContent=v+'%'; },
 dedChange:function(i,key){
   var cont=$('dedact_'+i), inp=$('ded_'+i); if(!cont||!inp)return;
   var val=inp.value, n=Number(val);
   if(val===''||isNaN(n)||n===deducOf(key)){ cont.innerHTML=''; return; }
   var kk=key.replace(/'/g,"\\'");
   cont.innerHTML='<button style="background:var(--cyan);color:#06222b;font-weight:700;font-size:11px;padding:6px 9px;border-radius:8px" onclick="B.dedValidate('+i+',\''+kk+'\')">Valider</button>';
 },
 dedValidate:function(i,key){
   var cont=$('dedact_'+i); if(!cont)return; var kk=key.replace(/'/g,"\\'");
   cont.innerHTML='<button style="background:var(--orange);color:#3a2606;font-weight:700;font-size:11px;padding:6px 9px;border-radius:8px" onclick="B.dedConfirm('+i+',\''+kk+'\')">Confirmer&nbsp;?</button>'
     +'<button style="color:var(--muted);padding:4px" onclick="B.dedCancel('+i+',\''+kk+'\')">'+ico('x',15)+'</button>';
 },
 dedConfirm:function(i,key){
   var inp=$('ded_'+i), cont=$('dedact_'+i); if(!inp)return;
   var n=Math.max(0,Math.min(100,Number(inp.value)||0));
   if(!state.settings.deduc)state.settings.deduc={};
   state.settings.deduc[key]=n; persist(); inp.value=n;
   if(cont){ cont.innerHTML='<span style="display:flex;align-items:center;color:var(--green)">'+ico('check',17,'var(--green)')+'</span>';
     setTimeout(function(){var c2=$('dedact_'+i); if(c2)c2.innerHTML='';},1200); }
 },
 dedCancel:function(i,key){
   var inp=$('ded_'+i), cont=$('dedact_'+i);
   if(inp)inp.value=deducOf(key); if(cont)cont.innerHTML='';
 },
 toggleForm:function(w){ if(w==='chantier'){ui.chantierForm=!ui.chantierForm;} else {ui.fraisForm=!ui.fraisForm; pendingBlob=null;} render(); },
 setFilter:function(f){ ui.filter=f; render(); },
 setCStatut:function(s){ ui.cStatut=s; var b=$('c_stat').children; b[0].className='selbtn'+(s==='en_cours'?' active':''); b[1].className='selbtn'+(s==='paye'?' active':''); },
 setFCat:function(k){ ui.fCat=k; },
 addChantier:function(){
   var client=$('c_client').value.trim(), montant=Number($('c_montant').value);
   if(!client||!montant){alert('Nom du client et montant requis.');return;}
   state.chantiers.unshift({id:uid(),client:client,description:$('c_desc').value.trim(),montant:montant,statut:ui.cStatut,date:todayISO()});
   persist(); ui.chantierForm=false; render();
 },
 toggleChantier:function(id){ state.chantiers=state.chantiers.map(function(c){return c.id===id?Object.assign({},c,{statut:c.statut==='paye'?'en_cours':'paye'}):c;}); persist(); render(); },
 delChantier:function(id){ state.chantiers=state.chantiers.filter(function(c){return c.id!==id;}); persist(); render(); },
 addFrais:function(){
   var lib=$('f_lib').value.trim(), montant=Number($('f_montant').value);
   if(!lib||!montant){alert('Libellé et montant requis.');return;}
   var id=uid();
   state.frais.unshift({id:id,libelle:lib,montant:montant,date:$('f_date').value||todayISO(),categorie:ui.fCat});
   persist();
   var blob=pendingBlob; pendingBlob=null;
   var finish=function(){ ui.fraisForm=false; render(); };
   if(blob){ idbPut({id:id,blob:blob,drive:null},function(ok){ if(ok)receiptIds[id]=true; finish(); }); }
   else finish();
 },
 delFrais:function(id){ state.frais=state.frais.filter(function(i){return i.id!==id;}); persist(); if(receiptIds[id]){idbDel(id);delete receiptIds[id];delete receiptDrive[id];} render(); },
 /* --- justificatifs --- */
 onPhoto:function(input){
   var file=input.files&&input.files[0]; input.value='';
   if(!file)return;
   var box=$('frais_preview'); if(box)box.innerHTML='<span class="muted2" style="font-size:12px">Compression…</span>';
   compressImage(file,function(blob){
     if(!blob){ if(box)box.innerHTML='<span style="color:var(--red);font-size:12px">Image illisible.</span>'; return; }
     pendingBlob=blob;
     var url=URL.createObjectURL(blob);
     if(box)box.innerHTML='<div class="thumb"><img src="'+url+'"/><div class="del" onclick="B.delPending()">'+ico('x',14)+'</div></div>';
   });
 },
 delPending:function(){ pendingBlob=null; var box=$('frais_preview'); if(box)box.innerHTML=''; },
 viewReceipt:function(id){
   currentReceipt=id;
   var m=$('modal'); m.className='modal'; m.innerHTML='<div class="imgwrap"><span class="muted">Chargement…</span></div>';
   idbGet(id,function(rec){
     if(!rec||!rec.blob){ m.innerHTML='<div class="imgwrap"><span class="muted">Ticket introuvable.</span></div><div class="bar"><button class="btn btn-ghost" style="flex:1" onclick="B.closeModal()">Fermer</button></div>'; return; }
     receiptDrive[id]=rec.drive||null;
     var url=URL.createObjectURL(rec.blob);
     m.innerHTML='<div class="imgwrap"><img src="'+url+'"/></div>'
       +'<div class="bar" id="modalDrive">'+B.driveBtnHTML(id)+'</div>'
       +'<div class="bar"><button class="btn btn-ghost" style="flex:1" onclick="B.closeModal()">Fermer</button>'
       +'<button class="btn btn-ghost" style="color:var(--red)" onclick="B.delReceipt(\''+id+'\')">'+ico('trash',17)+'Supprimer</button></div>';
   });
 },
 driveBtnHTML:function(id){
   var d=receiptDrive[id];
   if(d&&d.id)return '<div class="btn btn-ghost" style="flex:1;color:var(--green)">'+ico('check',17,'var(--green)')+'Sauvegardé sur Drive</div>';
   return '<button class="btn btn-ghost" style="flex:1" onclick="B.driveUpload(\''+id+'\')">'+ico('cloud',18,'var(--cyan)')+'Envoyer vers Drive</button>';
 },
 refreshModalDrive:function(id){ var el=$('modalDrive'); if(el)el.innerHTML=B.driveBtnHTML(id); },
 closeModal:function(){ currentReceipt=null; var m=$('modal'); m.className=''; m.innerHTML=''; },
 delReceipt:function(id){ idbDel(id,function(){ delete receiptIds[id]; delete receiptDrive[id]; B.closeModal(); render(); }); },
 driveUpload:function(id){
   var cid=effectiveClientId();
   if(!cid){ alert('Aucun ID client OAuth configuré.'); return; }
   if(!navigator.onLine){ alert('Aucune connexion réseau — réessaie une fois en ligne.'); return; }
   var el=$('modalDrive'); if(el)el.innerHTML='<div class="btn btn-ghost" style="flex:1">Connexion à Google…</div>';
   idbGet(id,function(rec){
     if(!rec||!rec.blob){ alert('Ticket introuvable.'); B.refreshModalDrive(id); return; }
     driveToken(cid,function(token,err){
       if(!token){ alert('Google Drive : '+(err||'échec')); B.refreshModalDrive(id); return; }
       if(el)el.innerHTML='<div class="btn btn-ghost" style="flex:1">Envoi en cours…</div>';
       driveEnsureFolder(token,function(folderId){
         driveUploadBlob(token,rec.blob,'ticket-'+id+'.jpg',folderId,function(j,err2){
           if(j&&j.id){ rec.drive={id:j.id,link:j.webViewLink||''}; idbPut(rec,function(){ receiptDrive[id]=rec.drive; B.refreshModalDrive(id); }); }
           else { alert('Envoi Drive échoué : '+(err2||'réponse invalide')); B.refreshModalDrive(id); }
         });
       });
     });
   });
 },
 setDriveClientId:function(v){ state.settings.driveClientId=(v||'').trim(); driveTok=null; driveTokExp=0; persist(); },
 toggleDriveAdv:function(){ ui.driveAdv=!ui.driveAdv; render(); },
 syncNow:function(silent){
   if(!effectiveClientId()){ if(!silent)toast('Aucun ID client OAuth configuré.'); return; }
   if(!navigator.onLine){ if(!silent)toast('Hors-ligne — synchronisation impossible.'); return; }
   if(syncBusy){ if(silent){ scheduleAutoSync(); return; } }
   syncBusy=true;
   if(!silent)toast('Synchronisation…');
   driveSync(silent,function(err,action,nUp,nDown){
     syncBusy=false;
     if(err){ if(err==='needauth'){ if(!silent)toast('Appuie sur « Connecter mon Drive » pour autoriser Google.'); return; }
       if(!silent)toast('Synchro : '+err); return; }
     state.settings.lastSync=Date.now(); persist(true);
     var s=$('syncStatus'); if(s)s.textContent=syncStatusText();
     if(action==='pulled'||nDown>0)render();
     if(!silent){
       var msg=action==='pulled'?'Données mises à jour depuis Drive.':action==='pushed'?'Sauvegarde envoyée sur Drive.':action==='uploaded'?'Première sauvegarde créée sur Drive.':'Déjà à jour.';
       var ex=[]; if(nUp>0)ex.push(nUp+' photo'+(nUp>1?'s':'')+' envoyée'+(nUp>1?'s':'')); if(nDown>0)ex.push(nDown+' photo'+(nDown>1?'s':'')+' restaurée'+(nDown>1?'s':''));
       if(ex.length)msg+=' '+ex.join(', ')+'.';
       toast(msg);
     }
   });
 },
 /* --- devis --- */
 devisVals:function(){
   return{
     prix:Number(($('d_prix')||{}).value)||0,
     coeff:Number(($('d_coeff')||{}).value)||0,
     heures:Number(($('d_heures')||{}).value)||0,
     tarif:Number(($('d_tarif')||{}).value)||0,
     depl:Number(($('d_depl')||{}).value)||0
   };
 },
 calc:function(){
   if(!$('r_total'))return;
   var v=B.devisVals();
   var mat=v.prix*v.coeff, mo=v.heures*v.tarif, total=mat+mo+v.depl;
   $('r_mat').textContent=fmt2(mat); $('r_mo').textContent=fmt2(mo);
   $('r_dep').textContent=fmt2(v.depl); $('r_total').textContent=fmt2(total);
   var ml=$('d_margeLbl'); if(ml)ml.textContent='Marge : +'+Math.round((v.coeff-1)*100)+'%';
   B.saveDevis();
 },
 syncCoeff:function(val){ if($('d_coeff'))$('d_coeff').value=val; if($('d_coeffR'))$('d_coeffR').value=val; B.calc(); },
 saveDevis:function(){
   if(!$('d_prix'))return; var v=B.devisVals();
   state.devis={prixAchat:$('d_prix').value,coeff:$('d_coeff').value,heures:$('d_heures').value,tarif:$('d_tarif').value,deplacement:$('d_depl').value};
   persist();
 },
 devisBody:function(){
   var v=B.devisVals(), mat=v.prix*v.coeff, mo=v.heures*v.tarif, total=mat+mo+v.depl;
   var client=($('d_client')||{}).value||'';
   var comp=(state.settings.companyName||'').trim();
   return (comp?comp+'\n':'')+'Devis'+(client?' - '+client:'')+'\n\n'
     +'- Materiel (achat '+fmt2(v.prix)+' x coef '+v.coeff+') : '+fmt2(mat)+'\n'
     +'- Main-d\'oeuvre ('+v.heures+'h x '+fmt2(v.tarif)+'/h) : '+fmt2(mo)+'\n'
     +'- Deplacement : '+fmt2(v.depl)+'\n\n'
     +'TOTAL A PAYER : '+fmt2(total)+'\n'
     +'(TVA non applicable, art. 56bis - franchise de TVA)'
     +(comp?'\n\n'+comp:'');
 },
 shareDevisPDF:function(){
   var v=B.devisVals(), mat=v.prix*v.coeff, mo=v.heures*v.tarif, total=mat+mo+v.depl;
   var client=(($('d_client')||{}).value||'').trim();
   var comp=(state.settings.companyName||'').trim();
   var L=[];
   if(comp)L.push({t:comp,size:18,bold:true});
   L.push({t:'DEVIS',size:14,bold:true,gap:comp?12:0});
   if(client)L.push({t:'Client : '+client,size:11,gap:8});
   L.push({t:'Date : '+frDate(todayISO()),size:11,gap:client?0:8});
   L.push({t:'Materiel (achat '+euroPDF(v.prix)+' x '+v.coeff+') : '+euroPDF(mat),size:11,gap:14});
   L.push({t:'Main-d\'oeuvre ('+v.heures+' h x '+euroPDF(v.tarif)+') : '+euroPDF(mo),size:11});
   L.push({t:'Deplacement : '+euroPDF(v.depl),size:11});
   L.push({t:'TOTAL A PAYER : '+euroPDF(total),size:15,bold:true,gap:16});
   L.push({t:'TVA non applicable, art. 56bis (franchise de TVA).',size:9,gap:18});
   if(comp)L.push({t:comp,size:10,gap:24});
   var name='devis'+(client?'-'+client.replace(/[^A-Za-z0-9]+/g,'_'):'')+'.pdf';
   sharePDF(makePDF(L),name,'Devis'+(client?' - '+client:''),B.devisBody());
 },
 convertDevis:function(){
   var v=B.devisVals(), total=Math.round(v.prix*v.coeff+v.heures*v.tarif+v.depl);
   var client=(($('d_client')||{}).value||'').trim()||'Nouveau client';
   state.chantiers.unshift({id:uid(),client:client,description:'Devis · matériel + '+v.heures+'h MO',montant:total,statut:'en_cours',date:todayISO()});
   persist(); ui.tab='chantiers'; render();
 },
 /* --- export --- */
 exportCSV:function(){
   function q(s){s=String(s==null?'':s);return /[";\r\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s;}
   var f=finance(), sep=';', L=[];
   var comp=(state.settings.companyName||'').trim();
   if(comp)L.push(q(comp));
   L.push('BOREAS ASSISTANT - Export du '+todayISO());
   L.push('');
   L.push('RESUME');
   L.push('CA encaisse'+sep+f.ca);
   L.push('Total frais reels'+sep+f.fraisReel);
   L.push('Frais deductibles'+sep+Math.round(f.fraisDeduc));
   L.push('Benefice net (base imposable)'+sep+Math.round(f.benefice));
   L.push('Provision '+f.taux+'%'+sep+Math.round(f.provision));
   L.push('Reste en poche'+sep+Math.round(f.reste));
   L.push('');
   L.push('CHANTIERS');
   L.push(['Date','Client','Description','Montant','Statut'].join(sep));
   state.chantiers.slice().sort(function(a,b){return(a.date||'').localeCompare(b.date||'');}).forEach(function(c){
     L.push([c.date,q(c.client),q(c.description),c.montant,c.statut==='paye'?'Paye':'En cours'].join(sep));
   });
   L.push('');
   L.push('FRAIS');
   L.push(['Date','Libelle','Categorie','Montant','% Deduc','Deductible'].join(sep));
   state.frais.slice().sort(function(a,b){return(a.date||'').localeCompare(b.date||'');}).forEach(function(i){
     var pd=deducOf(i.categorie);
     L.push([i.date,q(i.libelle),q(i.categorie),i.montant,pd,Math.round((Number(i.montant)||0)*pd/100)].join(sep));
   });
   var csv='﻿'+L.join('\r\n');
   try{
     var blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
     var url=URL.createObjectURL(blob);
     var a=document.createElement('a');
     a.href=url; a.download='boreas-export-'+todayISO()+'.csv';
     document.body.appendChild(a); a.click();
     setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(url);},1500);
   }catch(e){ alert('Export impossible sur ce navigateur : '+e.message); }
 },
 recapPDF:function(){
   var f=finance(); var comp=(state.settings.companyName||'').trim();
   var L=[];
   if(comp)L.push({t:comp,size:18,bold:true});
   L.push({t:'RECAPITULATIF',size:14,bold:true,gap:comp?12:0});
   L.push({t:'Au '+frDate(todayISO()),size:11,gap:8});
   L.push({t:'CA encaisse : '+euroPDF(f.ca),size:11,gap:14});
   L.push({t:'Total frais reels : '+euroPDF(f.fraisReel),size:11});
   L.push({t:'Frais deductibles : '+euroPDF(f.fraisDeduc),size:11});
   L.push({t:'Benefice net (base imposable) : '+euroPDF(f.benefice),size:11});
   L.push({t:'Provision '+f.taux+'% : '+euroPDF(f.provision),size:11});
   L.push({t:'Reste en poche : '+euroPDF(f.reste),size:12,bold:true});
   L.push({t:'Plafond franchise TVA : '+euroPDF(f.ca)+' / '+euroPDF(TVA_LIMIT),size:11,gap:14});
   L.push({t:'Chantiers payes : '+state.chantiers.filter(function(c){return c.statut==='paye';}).length,size:11});
   L.push({t:'Chantiers en cours : '+state.chantiers.filter(function(c){return c.statut!=='paye';}).length,size:11});
   L.push({t:'Frais enregistres : '+state.frais.length,size:11});
   sharePDF(makePDF(L),'recap-'+todayISO()+'.pdf','Recapitulatif'+(comp?' - '+comp:''),'Recapitulatif comptable'+(comp?' - '+comp:''));
 }
};
window.B=B;
render();

if(effectiveClientId()){ setTimeout(function(){ B.syncNow(true); }, 700); }
